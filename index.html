<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Austin's Sports</title>
<meta name="theme-color" content="#5fb2ec">
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Austin's Sports">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<style>
  :root{
    --bg:#5fb2ec;
    --surface:rgba(255,255,255,0.60); --surface2:rgba(255,255,255,0.45); --surface3:rgba(255,255,255,0.85);
    --solid:rgba(255,255,255,0.92);
    --glass:rgba(255,255,255,0.42); --glass-border:rgba(255,255,255,0.65);
    --ink:#0d2436; --ink2:#2e5069; --muted:#4f7189;
    --line:rgba(13,60,90,0.14); --hair:rgba(255,255,255,0.65);
    --live:#0a8f0a; --accent:#1668c9; --warn:#a35e00;
    --shadow:0 8px 24px rgba(20,70,110,0.16);
    color-scheme:light;
  }
  *{box-sizing:border-box}
  html{min-height:100%;
    background:linear-gradient(180deg,#4aa3e6 0%,#7cc3f2 38%,#b5def8 75%,#dbeffc 100%) fixed}
  html,body{margin:0;padding:0}
  body{
    background:transparent; color:var(--ink);
    font-family:system-ui,-apple-system,"Segoe UI",sans-serif;
    font-size:14px; line-height:1.4;
  }
  header{
    display:flex; flex-wrap:wrap; gap:10px; align-items:center;
    padding:14px 18px 10px; border-bottom:1px solid var(--glass-border);
    position:sticky; top:0; z-index:10;
    background:rgba(255,255,255,0.35);
    backdrop-filter:blur(18px) saturate(150%); -webkit-backdrop-filter:blur(18px) saturate(150%);
  }
  .brand{font-size:18px; font-weight:800; letter-spacing:.2px; margin-right:auto; color:var(--ink)}
  .datenav{display:flex; align-items:center; gap:6px}
  button, input[type="date"]{
    background:var(--surface2); color:var(--ink2); border:1px solid var(--glass-border);
    border-radius:10px; padding:6px 10px; font:inherit; cursor:pointer;
  }
  button:hover{background:var(--surface3); color:var(--ink)}
  button.primary{background:var(--accent); border-color:transparent; color:#fff}
  button.primary:hover{filter:brightness(1.1)}
  input[type="date"]{color-scheme:light}
  .refreshwrap{display:flex; align-items:center; gap:8px}
  #updated{font-size:12px; color:var(--muted); min-width:120px; text-align:right}
  nav#tabs{
    display:flex; gap:4px; padding:10px 14px 0; overflow-x:auto;
    border-bottom:1px solid var(--glass-border);
    position:sticky; top:57px; z-index:9;
    background:rgba(255,255,255,0.28);
    backdrop-filter:blur(18px) saturate(150%); -webkit-backdrop-filter:blur(18px) saturate(150%);
  }
  nav#tabs .tab{
    background:none; border:none; border-bottom:2px solid transparent;
    border-radius:0; color:var(--ink2); padding:8px 12px 10px; font-weight:600;
    white-space:nowrap;
  }
  nav#tabs .tab:hover{color:var(--ink); background:none}
  nav#tabs .tab.active{color:var(--ink); border-bottom-color:var(--accent)}
  nav#tabs .tab .dot{color:var(--live)}
  #subbar{display:flex; flex-wrap:wrap; gap:14px; padding:10px 18px 0}
  .seg{display:inline-flex; border:1px solid var(--glass-border); border-radius:10px; overflow:hidden; box-shadow:var(--shadow)}
  .seg button{border:none; border-radius:0; background:var(--surface2); padding:5px 12px; font-size:13px}
  .seg button.on{background:var(--surface3); color:var(--ink); font-weight:600}
  main{padding:14px 18px 40px; max-width:1280px; margin:0 auto}
  .section-h{
    font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:.08em;
    color:var(--muted); margin:18px 0 10px; display:flex; align-items:center; gap:8px;
  }
  .section-h:first-child{margin-top:4px}
  .grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(330px,1fr)); gap:10px}
  .card{
    background:var(--surface); border:1px solid var(--glass-border); border-radius:16px;
    padding:12px 14px; display:flex; flex-direction:column; gap:8px;
    box-shadow:var(--shadow);
  }
  .card.live{border-color:rgba(10,143,10,.55)}
  .card .toprow{display:flex; justify-content:space-between; align-items:center; gap:8px; font-size:12px; color:var(--muted)}
  .lgchip{
    font-size:10.5px; font-weight:700; letter-spacing:.06em; color:var(--ink2);
    background:var(--surface3); border-radius:5px; padding:2px 7px;
  }
  .livebadge{
    display:inline-flex; align-items:center; gap:5px; font-weight:700; font-size:11px;
    color:var(--live); letter-spacing:.05em;
  }
  .livebadge .pulse{
    width:7px; height:7px; border-radius:50%; background:var(--live);
    animation:pulse 1.6s ease-in-out infinite;
  }
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}
  .statustxt{font-size:12px; color:var(--ink2); text-align:right; white-space:nowrap}
  .statustxt.final{color:var(--muted); font-weight:600}
  .teamrow{display:flex; align-items:center; gap:9px; min-height:28px}
  .teamrow img.logo{width:24px; height:24px; object-fit:contain; flex:none}
  .abbr-badge{
    width:24px; height:24px; flex:none; border-radius:50%; background:var(--surface3);
    display:flex; align-items:center; justify-content:center; font-size:9px; font-weight:700; color:var(--ink2);
  }
  .teamrow .rank{font-size:10.5px; color:var(--muted); font-weight:700; flex:none}
  .teamrow .tname{font-weight:600; color:var(--ink); overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
  .teamrow .rec{font-size:11.5px; color:var(--muted); flex:none}
  .teamrow .score{
    margin-left:auto; font-size:19px; font-weight:700; font-variant-numeric:tabular-nums;
    color:var(--ink); flex:none; min-width:30px; text-align:right;
  }
  .teamrow.loser .tname, .teamrow.loser .score{color:var(--ink2); font-weight:500}
  .teamrow.winner .score::after{content:"◂"; color:var(--accent); font-size:11px; margin-left:5px}
  .meta{font-size:11.5px; color:var(--muted)}
  /* tennis */
  .tourney-h{font-size:15px; font-weight:700; margin:22px 0 2px}
  .tourney-h:first-child{margin-top:4px}
  .grouping-h{font-size:12px; color:var(--muted); font-weight:600; margin:10px 0 8px}
  .match .playerrow{display:flex; align-items:center; gap:8px; min-height:26px}
  .playerrow img.flag{width:18px; height:12px; object-fit:cover; border-radius:2px; flex:none}
  .playerrow .pname{font-weight:600; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
  .playerrow .seed{font-size:10.5px; color:var(--muted)}
  .playerrow .sets{margin-left:auto; display:flex; gap:4px; flex:none}
  .set{
    width:22px; height:22px; border-radius:5px; background:var(--surface2);
    display:flex; align-items:center; justify-content:center; font-size:12.5px;
    font-variant-numeric:tabular-nums; color:var(--ink2); position:relative;
  }
  .set.w{background:var(--surface3); color:var(--ink); font-weight:700}
  .set sup{font-size:8px; position:absolute; top:1px; right:2px; color:var(--muted)}
  .playerrow.loser .pname{color:var(--ink2); font-weight:500}
  .playerrow.winner .pname::after{content:" ✓"; color:var(--live); font-size:11px}
  .empty, .errbox{
    background:var(--surface); border:1px solid var(--hair); border-radius:12px;
    padding:22px; color:var(--muted); text-align:center;
  }
  .errbox{border-color:rgba(163,94,0,.45); color:var(--ink2)}
  .errbox b{color:var(--warn)}
  .loading{color:var(--muted); padding:30px; text-align:center}
  .spinner{
    display:inline-block; width:16px; height:16px; border:2px solid var(--surface3);
    border-top-color:var(--accent); border-radius:50%; animation:spin .8s linear infinite;
    vertical-align:-3px; margin-right:8px;
  }
  @keyframes spin{to{transform:rotate(360deg)}}
  /* ---- game detail panel ---- */
  .card[data-eid]{cursor:pointer; transition:transform .15s ease, border-color .15s ease}
  .card[data-eid]:hover{border-color:rgba(22,104,201,.6); transform:translateY(-2px)}
  #backdrop{position:fixed; inset:0; background:rgba(20,55,85,.35); z-index:20; opacity:0; pointer-events:none; transition:opacity .2s}
  #backdrop.show{opacity:1; pointer-events:auto}
  #panel{position:fixed; top:0; right:0; bottom:0; width:min(620px,100vw);
    background:rgba(235,247,255,0.78);
    backdrop-filter:blur(24px) saturate(160%); -webkit-backdrop-filter:blur(24px) saturate(160%);
    border-left:1px solid var(--glass-border); z-index:21; transform:translateX(103%); transition:transform .22s ease;
    display:flex; flex-direction:column; box-shadow:-12px 0 40px rgba(20,70,110,0.25)}
  #panel.open{transform:none}
  .p-head{padding:12px 16px; border-bottom:1px solid var(--line); display:flex; align-items:flex-start; gap:10px}
  .p-head .close{margin-left:auto; flex:none}
  .p-score{display:flex; align-items:center; gap:14px; flex-wrap:wrap}
  .p-team{display:flex; align-items:center; gap:8px; font-weight:700}
  .p-team img{width:28px; height:28px; object-fit:contain}
  .p-team .sc{font-size:22px; font-variant-numeric:tabular-nums}
  .p-status{width:100%; font-size:12px; color:var(--ink2); display:flex; gap:8px; align-items:center}
  .p-tabs{display:flex; gap:4px; padding:8px 12px 0; border-bottom:1px solid var(--line)}
  .p-tabs button{background:none; border:none; border-radius:0; border-bottom:2px solid transparent; color:var(--ink2); font-weight:600; padding:7px 11px 9px}
  .p-tabs button:hover{background:none; color:var(--ink)}
  .p-tabs button.active{color:var(--ink); border-bottom-color:var(--accent)}
  .p-body{overflow-y:auto; padding:14px 16px 30px; flex:1}
  .cmp-row{display:grid; grid-template-columns:1fr auto 1fr; gap:10px; padding:5px 0; border-bottom:1px solid var(--line); font-size:13px}
  .cmp-row .lab{color:var(--muted); text-align:center; font-size:12px}
  .cmp-row .v{font-variant-numeric:tabular-nums; font-weight:600}
  .cmp-row .v.home{text-align:right}
  .cmp-head{display:grid; grid-template-columns:1fr auto 1fr; gap:10px; padding:4px 0 8px; font-weight:700; font-size:12px; color:var(--ink2)}
  .cmp-head .home{text-align:right}
  .leaders-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:16px}
  .leadbox{background:var(--surface); border:1px solid var(--hair); border-radius:10px; padding:10px 12px}
  .leadbox h4{margin:0 0 6px; font-size:12px; color:var(--ink2)}
  .leadbox .lrow{display:flex; gap:8px; font-size:12.5px; padding:3px 0; align-items:baseline}
  .leadbox .lrow .lcat{color:var(--muted); flex:none; width:64px; font-size:11px}
  .leadbox .lrow .lname{overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
  .leadbox .lrow .lv{margin-left:auto; font-weight:700; font-variant-numeric:tabular-nums}
  .tablewrap{overflow-x:auto; margin:6px 0 16px; border:1px solid var(--glass-border); border-radius:12px; background:var(--solid); box-shadow:var(--shadow)}
  table.stat{border-collapse:collapse; width:100%; font-size:12px; white-space:nowrap}
  table.stat th{color:var(--muted); font-weight:600; text-transform:uppercase; font-size:10px; letter-spacing:.05em; padding:7px 8px; text-align:right; background:var(--solid)}
  table.stat td{padding:5px 8px; border-top:1px solid var(--line); text-align:right; font-variant-numeric:tabular-nums; color:var(--ink2)}
  table.stat th:first-child, table.stat td:first-child{text-align:left; position:sticky; left:0; background:var(--solid); color:var(--ink); max-width:160px; overflow:hidden; text-overflow:ellipsis}
  table.stat tr.tot td{font-weight:700; color:var(--ink)}
  .grp-h{font-size:13px; font-weight:700; margin:16px 0 2px}
  .play{display:flex; gap:10px; padding:7px 2px; border-bottom:1px solid var(--line); font-size:12.5px}
  .play .pwhen{flex:none; width:70px; color:var(--muted); font-variant-numeric:tabular-nums; font-size:11.5px}
  .play .ptxt{color:var(--ink2)}
  .play .psc{margin-left:auto; flex:none; color:var(--muted); font-variant-numeric:tabular-nums; font-size:11.5px}
  .play.scoring{border-left:3px solid var(--live); padding-left:8px}
  .play.scoring .ptxt{color:var(--ink)}
  .drive{margin:0 0 14px; border:1px solid var(--hair); border-radius:10px; overflow:hidden}
  .drive .d-h{display:flex; align-items:center; gap:8px; padding:8px 12px; background:var(--surface); font-size:12.5px}
  .drive .d-h img{width:18px; height:18px; object-fit:contain}
  .drive .d-h .res{margin-left:auto; font-weight:700; color:var(--ink); flex:none}
  .drive .d-plays{padding:2px 12px 6px}
  .p-note{color:var(--muted); font-size:12.5px; padding:16px 0; text-align:center}
  /* ---- tennis extras ---- */
  .playerrow .rankchip{font-size:10px; color:var(--muted); flex:none}
  .playerrow .cflag{font-size:10px; color:var(--muted); flex:none; width:26px}
  .set.pt{background:transparent; border:1px solid var(--accent); color:var(--accent); font-weight:700}
  .srcline{font-size:11px; color:var(--muted); margin:2px 0 10px}
  .headshot{width:34px; height:34px; border-radius:50%; object-fit:cover; background:var(--surface3); flex:none}
  .headshot.sm{width:22px; height:22px}
  .leadbox .lrow{align-items:center}
  /* ---- point by point ---- */
  .pbp-set h4{font-size:12px; color:var(--ink2); margin:14px 0 6px; text-transform:uppercase; letter-spacing:.06em}
  .pbp-game{border:1px solid var(--hair); border-radius:8px; padding:7px 10px; margin:0 0 6px; background:var(--surface)}
  .pbp-game .g-h{font-size:11px; color:var(--muted); display:flex; gap:8px; margin-bottom:5px; align-items:baseline}
  .pbp-game .g-h b{color:var(--ink2)}
  .pbp-game .g-h .brklab{color:var(--warn); font-weight:700; letter-spacing:.05em}
  .ptchips{display:flex; flex-wrap:wrap; gap:4px}
  .ptchip{font-size:10.5px; padding:2px 6px; border-radius:5px; background:var(--surface3); color:var(--ink2); font-variant-numeric:tabular-nums}
  /* ---- field / court views ---- */
  .fieldwrap{margin:0 0 14px; border:1px solid var(--hair); border-radius:12px; overflow:hidden; background:var(--surface)}
  .fieldwrap svg{display:block; width:100%; height:auto; max-height:340px}
  .fieldlegend{display:flex; flex-wrap:wrap; gap:14px; padding:7px 12px; font-size:11px; color:var(--muted); border-top:1px solid var(--line)}
  .fieldlegend .sw{display:inline-block; width:9px; height:9px; border-radius:50%; margin-right:5px; vertical-align:-1px}
  .ticker{display:flex; gap:10px; align-items:baseline; padding:9px 12px; margin:0 0 12px; background:var(--surface); border:1px solid var(--hair); border-left:3px solid var(--accent); border-radius:10px; font-size:12.5px}
  .ticker .twhen{color:var(--muted); flex:none; font-size:11px; font-variant-numeric:tabular-nums}
  .ticker.anim{animation:slidein .45s ease}
  @keyframes slidein{from{transform:translateY(-7px); opacity:0}to{transform:none; opacity:1}}
  .mk.new{animation:markping 1s ease-out 2}
  @keyframes markping{0%{opacity:.25}50%{opacity:1}100%{opacity:.25}}
  .ball{transition:cx 1s ease, cy 1s ease}
  .scorestrip{display:flex; align-items:center; gap:12px; padding:10px 12px}
  .scorestrip .sname{font-weight:600; font-size:13px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
  .scorestrip .cpt{font-size:24px; font-weight:700; font-variant-numeric:tabular-nums; margin-left:auto}
  .scorestrip .cpt.pop, .set.pt.pop{animation:pop .5s ease}
  @keyframes pop{0%{transform:scale(1)}40%{transform:scale(1.3)}100%{transform:scale(1)}}
  .tball.bounce{animation:tbounce .6s ease}
  @keyframes tbounce{0%{opacity:0; transform:translateY(-8px)}60%{transform:translateY(2px)}100%{opacity:1; transform:none}}
  footer{padding:18px; text-align:center; font-size:11.5px; color:var(--muted); border-top:1px solid var(--line)}
  @media (max-width:640px){
    #updated{display:none}
    main{padding:12px 10px 40px}
    .grid{grid-template-columns:1fr}
  }
</style>
</head>
<body>
<header>
  <div class="brand">Austin's Sports</div>
  <div class="datenav">
    <button id="prevDay" title="Previous day">‹</button>
    <button id="todayBtn">Today</button>
    <input type="date" id="datePick">
    <button id="nextDay" title="Next day">›</button>
  </div>
  <div class="refreshwrap">
    <button id="refreshBtn" class="primary">↻ Refresh</button>
    <span id="updated"></span>
  </div>
</header>
<nav id="tabs"></nav>
<div id="subbar"></div>
<main id="content"><div class="loading"><span class="spinner"></span>Loading scores…</div></main>
<div id="backdrop"></div>
<aside id="panel" aria-hidden="true"></aside>
<footer>Unofficial ESPN &amp; SofaScore public feeds · personal use · times shown in your local timezone · click any game for stats, play-by-play &amp; live field view</footer>

<script>
"use strict";
/* ============================== config ============================== */
const API = "https://site.api.espn.com/apis/site/v2/sports/";
const LEAGUES = {
  nfl:  {label:"NFL",  path:"football/nfl",                         type:"team"},
  nba:  {label:"NBA",  path:"basketball/nba",                       type:"team"},
  wnba: {label:"WNBA", path:"basketball/wnba",                      type:"team"},
  nhl:  {label:"NHL",  path:"hockey/nhl",                           type:"team"},
  cfb:  {label:"CFB",  path:"football/college-football",            type:"team", college:{groups:"80", allLabel:"All FBS"}},
  mcb:  {label:"CBB·M",path:"basketball/mens-college-basketball",   type:"team", college:{groups:"50", allLabel:"All D-I"}},
  wcb:  {label:"CBB·W",path:"basketball/womens-college-basketball", type:"team", college:{groups:"50", allLabel:"All D-I"}},
  atp:  {label:"ATP",  path:"tennis/atp",                           type:"tennis"},
  wta:  {label:"WTA",  path:"tennis/wta",                           type:"tennis"},
};
const TABS = [
  {id:"live",   label:"Live"},
  {id:"tennis", label:"Tennis"},
  {id:"wnba",   label:"WNBA",  leagues:["wnba"]},
  {id:"nfl",    label:"NFL",   leagues:["nfl"]},
  {id:"nba",    label:"NBA",   leagues:["nba"]},
  {id:"nhl",    label:"NHL",   leagues:["nhl"]},
  {id:"cfb",    label:"CFB",   leagues:["cfb"]},
  {id:"cbb",    label:"CBB",   leagues:[]}, // resolved by gender toggle
];
const ALL_KEYS = Object.keys(LEAGUES);
const REFRESH_MS = 30000, CACHE_MS = 25000;

/* ============================== state ============================== */
const state = {
  date: new Date(),
  tab: "live",
  tennisTour: "both",          // both | atp | wta
  cbbGender: "mcb",            // mcb | wcb
  scopeAll: {cfb:false, mcb:false, wcb:false}, // false = Top 25 feed
};
const cache = new Map();       // key -> {t, data, err}
let lastUpdated = null, fetchSeq = 0;

/* ============================== utils ============================== */
const $ = sel => document.querySelector(sel);
const esc = s => String(s ?? "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const ymd = d => `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,"0")}${String(d.getDate()).padStart(2,"0")}`;
const sameDay = (a,b) => a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate();
const isToday = () => sameDay(state.date, new Date());
const fmtTime = d => d.toLocaleTimeString([], {hour:"numeric", minute:"2-digit"});
const fmtDateLong = d => d.toLocaleDateString([], {weekday:"long", month:"long", day:"numeric"});

/* ============================== fetching ============================== */
function urlFor(key){
  const lg = LEAGUES[key];
  let u = `${API}${lg.path}/scoreboard?dates=${ymd(state.date)}&limit=300`;
  if (lg.college && state.scopeAll[key]) u += `&groups=${lg.college.groups}`;
  return u;
}
function cacheKey(key){
  return `${key}|${ymd(state.date)}|${lg_scope(key)}`;
}
function lg_scope(key){ return LEAGUES[key].college ? (state.scopeAll[key] ? "all" : "top") : "-"; }

async function fetchLeague(key, force){
  const ck = cacheKey(key);
  const hit = cache.get(ck);
  if (!force && hit && (Date.now() - hit.t) < CACHE_MS) return hit;
  try {
    const res = await fetch(urlFor(key), {cache:"no-store"});
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const json = await res.json();
    const data = LEAGUES[key].type === "tennis" ? parseTennis(json, key) : parseTeam(json, key);
    const entry = {t: Date.now(), data, err: null};
    cache.set(ck, entry);
    return entry;
  } catch (e) {
    const entry = {t: Date.now(), data: null, err: e.message || "fetch failed"};
    cache.set(ck, entry);
    return entry;
  }
}

/* ============================== parsing ============================== */
function parseTeam(json, key){
  return (json.events || []).map(ev => {
    const comp = (ev.competitions || [])[0] || {};
    const comps = comp.competitors || [];
    const home = comps.find(c => c.homeAway === "home") || comps[0] || {};
    const away = comps.find(c => c.homeAway === "away") || comps[1] || {};
    const st = ev.status || comp.status || {};
    const t = st.type || {};
    const side = c => {
      const team = c.team || {};
      const rank = c.curatedRank && c.curatedRank.current;
      return {
        name: team.shortDisplayName || team.displayName || team.name || "TBD",
        abbr: team.abbreviation || "",
        logo: team.logo || (team.logos && team.logos[0] && team.logos[0].href) || "",
        score: c.score != null ? String(c.score) : "",
        record: (c.records && c.records[0] && c.records[0].summary) || "",
        winner: !!c.winner,
        rank: (rank && rank <= 25) ? rank : null,
      };
    };
    const bc = (comp.broadcasts && comp.broadcasts[0] && comp.broadcasts[0].names && comp.broadcasts[0].names[0]) || "";
    return {
      id: ev.id, league: key,
      start: new Date(ev.date),
      state: t.state || "pre",                       // pre | in | post
      detail: t.shortDetail || t.detail || "",
      completed: !!t.completed,
      home: side(home), away: side(away),
      broadcast: bc,
      note: (t.state === "pre" && /postpon|cancel|delay|suspend/i.test(t.detail || "")) ? t.detail : "",
    };
  });
}

function parseTennis(json, key){
  const out = [];
  for (const ev of (json.events || [])) {
    const tourney = ev.name || ev.shortName || "Tournament";
    const groupings = ev.groupings || (ev.competitions ? [{competitions: ev.competitions}] : []);
    for (const g of groupings) {
      const gname = (g.grouping && (g.grouping.displayName || g.grouping.shortName)) || g.displayName || "";
      for (const m of (g.competitions || [])) {
        const st = m.status || {}; const t = st.type || {};
        const players = (m.competitors || []).map(c => {
          const a = c.athlete || {};
          return {
            name: a.shortName || a.displayName || "TBD",
            flag: (a.flag && a.flag.href) || "",
            seed: c.seed || null,
            winner: !!c.winner,
            sets: (c.linescores || []).map(ls => ({
              v: (ls.value != null ? ls.value : ls.displayValue),
              tb: (ls.tiebreak != null ? ls.tiebreak : null),
              w: !!ls.winner,
            })),
          };
        });
        out.push({
          id: m.id, league: key, tourney, grouping: gname,
          round: (m.round && (m.round.displayName || m.round.shortName)) || "",
          court: (m.venue && (m.venue.court || m.venue.fullName)) || "",
          start: new Date(m.date || ev.date),
          state: t.state || "pre",
          detail: t.shortDetail || t.detail || "",
          players,
        });
      }
    }
  }
  return out;
}

/* ============================== tennis provider (SofaScore, ESPN fallback) ============================== */
const SOFA = "https://api.sofascore.com/api/v1";
const HEADSHOT_LG = {nba:"nba", wnba:"wnba", nfl:"nfl", nhl:"nhl", cfb:"college-football", mcb:"mens-college-basketball", wcb:"womens-college-basketball"};
const headshotUrl = (key, athleteId) =>
  (athleteId && HEADSHOT_LG[key]) ? `https://a.espncdn.com/combiner/i?img=/i/headshots/${HEADSHOT_LG[key]}/players/full/${athleteId}.png&w=96&h=70&cb=1` : "";

const mapSofaState = t => t === "inprogress" ? "in" : (t === "finished" ? "post" : "pre");

function parseSofaEvents(events){
  const out = [];
  for (const e of (events || [])) {
    const cat = (e.tournament && e.tournament.category && e.tournament.category.slug) || "";
    if (cat !== "atp" && cat !== "wta") continue;
    const hn = (e.homeTeam && e.homeTeam.name) || "", an = (e.awayTeam && e.awayTeam.name) || "";
    if (hn.includes("/") || an.includes("/")) continue; // skip doubles
    const hs = e.homeScore || {}, as = e.awayScore || {};
    const mkSets = (mine, theirs) => {
      const arr = [];
      for (let i = 1; i <= 5; i++) {
        const v = mine["period" + i];
        if (v == null) continue;
        const o = theirs["period" + i];
        arr.push({v, tb: mine["period" + i + "TieBreak"] ?? null, w: o != null && v > o});
      }
      return arr;
    };
    const side = (team, mine, theirs, winner) => ({
      name: (team && team.name) || "TBD",
      rank: (team && team.ranking) || null,
      country: (team && team.country && team.country.alpha3) || "",
      img: (team && team.id) ? `${SOFA}/team/${team.id}/image` : "",
      seed: null, winner,
      point: mine.point != null ? String(mine.point) : null,
      sets: mkSets(mine, theirs),
    });
    out.push({
      id: e.id, league: cat, source: "sofa",
      tourney: (e.tournament && ((e.tournament.uniqueTournament && e.tournament.uniqueTournament.name) || e.tournament.name)) || "Tournament",
      grouping: (e.tournament && e.tournament.category && e.tournament.category.name) || cat.toUpperCase(),
      round: (e.roundInfo && e.roundInfo.name) || "",
      court: e.groundType || "",
      start: new Date((e.startTimestamp || 0) * 1000),
      state: mapSofaState(e.status && e.status.type),
      detail: (e.status && e.status.description) || "",
      players: [side(e.homeTeam, hs, as, e.winnerCode === 1), side(e.awayTeam, as, hs, e.winnerCode === 2)],
    });
  }
  return out;
}

async function fetchTennis(force){
  const ck = `tennis|${ymd(state.date)}`;
  const hit = cache.get(ck);
  if (!force && hit && Date.now() - hit.t < CACHE_MS) return hit;
  let entry;
  try {
    const d = state.date;
    const dash = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
    const urls = [`${SOFA}/sport/tennis/scheduled-events/${dash}`];
    if (isToday()) urls.push(`${SOFA}/sport/tennis/events/live`);
    const jsons = await Promise.all(urls.map(u => fetch(u, {cache: "no-store"}).then(r => { if (!r.ok) throw new Error("HTTP " + r.status); return r.json(); })));
    const byId = new Map();
    for (const j of jsons) for (const m of parseSofaEvents(j.events)) byId.set(m.id, m);
    entry = {t: Date.now(), data: [...byId.values()], err: null, source: "SofaScore"};
  } catch (e) {
    // fall back to ESPN
    try {
      const [a, w] = await Promise.all([fetchLeague("atp", force), fetchLeague("wta", force)]);
      if (a.err && w.err) throw new Error(a.err);
      const data = [...(a.data || []), ...(w.data || [])].map(m => ({...m, source: "espn"}));
      entry = {t: Date.now(), data, err: null, source: "ESPN (fallback)"};
    } catch (e2) {
      entry = {t: Date.now(), data: null, err: e.message || "failed", source: null};
    }
  }
  cache.set(ck, entry);
  return entry;
}

/* ============================== rendering ============================== */
const stateOrder = {in:0, pre:1, post:2};
const sortGames = (a,b) => (stateOrder[a.state] ?? 3) - (stateOrder[b.state] ?? 3) || a.start - b.start;

function logoImg(side){
  if (side.logo) return `<img class="logo" src="${esc(side.logo)}" alt="" loading="lazy" onerror="this.outerHTML='<span class=&quot;abbr-badge&quot;>${esc(side.abbr)}</span>'">`;
  return `<span class="abbr-badge">${esc(side.abbr || "?")}</span>`;
}
function teamRowHtml(side, g){
  const done = g.state === "post";
  const cls = done ? (side.winner ? "winner" : "loser") : "";
  return `<div class="teamrow ${cls}">
    ${logoImg(side)}
    ${side.rank ? `<span class="rank">${side.rank}</span>` : ""}
    <span class="tname">${esc(side.name)}</span>
    ${side.record ? `<span class="rec">${esc(side.record)}</span>` : ""}
    <span class="score">${g.state === "pre" ? "" : esc(side.score)}</span>
  </div>`;
}
function statusHtml(g){
  if (g.state === "in") return `<span class="livebadge"><span class="pulse"></span>LIVE</span><span class="statustxt">${esc(g.detail)}</span>`;
  if (g.state === "post") return `<span class="statustxt final">${esc(g.detail || "Final")}</span>`;
  return `<span class="statustxt">${g.note ? esc(g.note) : fmtTime(g.start)}</span>`;
}
function teamCard(g, withChip){
  return `<div class="card ${g.state === "in" ? "live" : ""}" data-league="${esc(g.league)}" data-eid="${esc(g.id)}">
    <div class="toprow">
      <span>${withChip ? `<span class="lgchip">${esc(LEAGUES[g.league].label)}</span>` : ""}</span>
      <span style="display:flex;gap:8px;align-items:center">${statusHtml(g)}</span>
    </div>
    ${teamRowHtml(g.away, g)}
    ${teamRowHtml(g.home, g)}
    ${g.broadcast ? `<div class="meta">📺 ${esc(g.broadcast)}</div>` : ""}
  </div>`;
}
function setBox(s){
  return `<span class="set ${s.w ? "w" : ""}">${esc(s.v)}${s.tb != null ? `<sup>${esc(s.tb)}</sup>` : ""}</span>`;
}
function playerRow(p, m){
  const done = m.state === "post";
  const cls = done ? (p.winner ? "winner" : "loser") : "";
  const live = m.state === "in";
  return `<div class="playerrow ${cls}">
    ${p.flag ? `<img class="flag" src="${esc(p.flag)}" alt="" loading="lazy" onerror="this.style.display='none'">`
      : (p.country ? `<span class="cflag">${esc(p.country)}</span>` : "")}
    <span class="pname">${esc(p.name)}</span>
    ${p.seed ? `<span class="seed">(${esc(p.seed)})</span>` : ""}
    ${p.rank ? `<span class="rankchip">#${esc(p.rank)}</span>` : ""}
    <span class="sets">${p.sets.map(setBox).join("")}${live && p.point != null ? `<span class="set pt">${esc(p.point)}</span>` : ""}</span>
  </div>`;
}
function tennisCard(m, withChip){
  const sub = [withChip ? m.tourney : null, m.round, m.court].filter(Boolean).join(" · ");
  return `<div class="card match ${m.state === "in" ? "live" : ""}" data-league="${esc(m.league)}" data-eid="${esc(m.id)}">
    <div class="toprow">
      <span>${withChip ? `<span class="lgchip">${esc(LEAGUES[m.league].label)}</span> ` : ""}${esc(sub)}</span>
      <span style="display:flex;gap:8px;align-items:center">${
        m.state === "in" ? `<span class="livebadge"><span class="pulse"></span>LIVE</span>` :
        m.state === "post" ? `<span class="statustxt final">${esc(m.detail || "Final")}</span>` :
        `<span class="statustxt">${fmtTime(m.start)}</span>`}</span>
    </div>
    ${m.players.map(p => playerRow(p, m)).join("")}
  </div>`;
}

function renderTeamLeague(entry, key){
  if (entry.err) return errBox(key, entry.err);
  const games = (entry.data || []).slice().sort(sortGames);
  if (!games.length) return `<div class="empty">No ${LEAGUES[key].label} games on ${esc(fmtDateLong(state.date))}.</div>`;
  return `<div class="grid">${games.map(g => teamCard(g, false)).join("")}</div>`;
}

function renderTennis(entry){
  if (entry.err && !entry.data) return globalErr();
  let all = entry.data || [];
  if (state.tennisTour !== "both") all = all.filter(m => m.league === state.tennisTour);
  const espn = !!(entry.source && entry.source.indexOf("ESPN") === 0);
  // SofaScore feeds are already date-scoped; ESPN returns the tournament window
  let day = espn ? all.filter(m => sameDay(m.start, state.date) || m.state === "in") : all;
  let note = "";
  if (espn && !day.length && all.length) { day = all; note = `<div class="meta" style="margin-bottom:10px">No matches dated ${esc(fmtDateLong(state.date))} — showing the current tournament window.</div>`; }
  const src = `<div class="srcline">Tennis data: ${esc(entry.source || "—")}${espn ? " · limited stats" : " · ATP & WTA singles"}</div>`;
  if (!day.length) {
    return src + `<div class="empty">No tennis matches on ${esc(fmtDateLong(state.date))}.</div>`;
  }
  day.sort(sortGames);
  // group: tournament -> grouping
  const byT = new Map();
  for (const m of day) {
    if (!byT.has(m.tourney)) byT.set(m.tourney, new Map());
    const byG = byT.get(m.tourney);
    const gk = m.grouping || "Matches";
    if (!byG.has(gk)) byG.set(gk, []);
    byG.get(gk).push(m);
  }
  let html = src + note;
  for (const [t, byG] of byT) {
    html += `<div class="tourney-h">${esc(t)}</div>`;
    for (const [gname, ms] of byG) {
      html += `<div class="grouping-h">${esc(gname)}</div><div class="grid">${ms.map(m => tennisCard(m, false)).join("")}</div>`;
    }
  }
  return html;
}

function renderLive(results){
  const errs = results.filter(r => r.entry.err);
  let games = [];
  for (const r of results) if (r.entry.data) {
    // team feeds are already scoped to the selected date; tennis (ESPN fallback)
    // can return the whole tournament window, so keep live + the selected day's
    const isTennis = r.key === "tennis";
    games = games.concat(isTennis
      ? r.entry.data.filter(m => m.state === "in" || sameDay(m.start, state.date))
      : r.entry.data);
  }
  const live = games.filter(g => g.state === "in").sort((a,b) => a.start - b.start);
  const upcoming = games.filter(g => g.state === "pre").sort((a,b) => a.start - b.start);
  const finals = games.filter(g => g.state === "post").sort((a,b) => b.start - a.start);
  const card = g => LEAGUES[g.league].type === "tennis" ? tennisCard(g, true) : teamCard(g, true);
  let html = "";
  if (errs.length === results.length && results.length) return globalErr();
  if (live.length) html += `<div class="section-h"><span class="livebadge"><span class="pulse"></span></span>Live now · ${live.length}</div><div class="grid">${live.map(card).join("")}</div>`;
  else html += `<div class="empty">Nothing live right now${upcoming.length ? " — next games below" : ""}.</div>`;
  if (upcoming.length) html += `<div class="section-h">Coming up · ${esc(fmtDateLong(state.date))}</div><div class="grid">${upcoming.slice(0,18).map(card).join("")}</div>`;
  if (finals.length) html += `<div class="section-h">Finals</div><div class="grid">${finals.slice(0,18).map(card).join("")}</div>`;
  if (!live.length && !upcoming.length && !finals.length)
    html = `<div class="empty">A quiet day — no games found across your leagues for ${esc(fmtDateLong(state.date))}.<br><span class="meta">Off-season leagues won't have games; try the date arrows or check Tennis/WNBA.</span></div>`;
  if (errs.length) html += errs.map(e => errBox(e.key, e.entry.err)).join("");
  return html;
}

function errBox(key, msg){
  return `<div class="errbox" style="margin:8px 0"><b>${esc(LEAGUES[key].label)}</b> feed couldn't load (${esc(msg)}). It'll retry on the next refresh.</div>`;
}
function globalErr(){
  return `<div class="errbox"><b>Couldn't reach the score feeds.</b><br>
  If you're viewing this inside the Claude sidebar and it keeps failing, download the HTML file from the chat and open it directly in your browser — the feeds load fine there. Otherwise check your connection and hit Refresh.</div>`;
}

/* ============================== views ============================== */
function activeLeagues(){
  if (state.tab === "live") return ["nfl","nba","wnba","nhl","cfb","mcb","wcb","tennis"];
  if (state.tab === "tennis") return ["tennis"];
  if (state.tab === "cbb") return [state.cbbGender];
  const t = TABS.find(t => t.id === state.tab);
  return (t && t.leagues) || [];
}

async function refresh(force){
  const seq = ++fetchSeq;
  const keys = activeLeagues();
  const content = $("#content");
  if (!keys.length) { content.innerHTML = ""; return; }
  const anyCached = keys.some(k => cache.has(k === "tennis" ? `tennis|${ymd(state.date)}` : cacheKey(k)));
  if (!anyCached) content.innerHTML = `<div class="loading"><span class="spinner"></span>Loading scores…</div>`;
  const results = await Promise.all(keys.map(async k =>
    ({key: k, entry: k === "tennis" ? await fetchTennis(force) : await fetchLeague(k, force)})));
  if (seq !== fetchSeq) return; // stale
  lastUpdated = new Date();
  let html;
  if (state.tab === "live") html = renderLive(results);
  else if (state.tab === "tennis") html = renderTennis(results[0].entry);
  else {
    const r = results[0];
    if (r.entry.err && !r.entry.data) html = globalErr();
    else html = renderTeamLeague(r.entry, r.key);
  }
  content.innerHTML = html;
  updateStamp();
}

/* ============================== game detail panel ============================== */
const panel = {open:false, league:null, eid:null, tab:"stats", data:null, err:null};
const detailCache = new Map();

async function fetchDetail(key, eid, force){
  const ck = `d|${key}|${eid}`;
  const hit = detailCache.get(ck);
  if (!force && hit && Date.now() - hit.t < CACHE_MS) return hit;
  try {
    const res = await fetch(`${API}${LEAGUES[key].path}/summary?event=${eid}`, {cache:"no-store"});
    if (!res.ok) throw new Error("HTTP " + res.status);
    const data = parseSummary(await res.json(), key);
    // fallback: some feeds keep play-by-play on a separate endpoint
    if (!data.plays.length && !data.drives.length) {
      try {
        const r2 = await fetch(`${API}${LEAGUES[key].path}/playbyplay?event=${eid}`, {cache:"no-store"});
        if (r2.ok) {
          const j2 = await r2.json();
          data.plays = normPlays(j2.plays || (j2.gamepackageJSON && j2.gamepackageJSON.plays) || []);
        }
      } catch (_) {}
    }
    const entry = {t: Date.now(), data, err: null};
    detailCache.set(ck, entry);
    return entry;
  } catch (e) {
    const entry = {t: Date.now(), data: null, err: e.message || "failed"};
    detailCache.set(ck, entry);
    return entry;
  }
}

const perLabel = n => n ? (n + (["st","nd","rd"][n-1] || "th")) : "";
function normPlays(arr){
  return (arr || []).map(p => ({
    id: p.id != null ? String(p.id) : (p.sequenceNumber != null ? String(p.sequenceNumber) : null),
    clock: (p.clock && p.clock.displayValue) || "",
    period: (p.period && (p.period.displayValue || perLabel(p.period.number))) || "",
    text: p.text || "",
    scoring: !!p.scoringPlay,
    shooting: !!p.shootingPlay,
    type: (p.type && p.type.text) || "",
    teamId: (p.team && p.team.id != null) ? String(p.team.id) : null,
    coord: (p.coordinate && typeof p.coordinate.x === "number") ? {x: p.coordinate.x, y: p.coordinate.y} : null,
    away: p.awayScore, home: p.homeScore,
  })).reverse().slice(0, 120);
}

function parseSummary(json, key){
  const bs = json.boxscore || {};
  // header (mini scoreboard)
  let header = null;
  const hc = json.header && json.header.competitions && json.header.competitions[0];
  if (hc) {
    const t = (hc.status && hc.status.type) || {};
    const side = ha => {
      const c = (hc.competitors || []).find(x => x.homeAway === ha) || {};
      const tm = c.team || {};
      return {name: tm.shortDisplayName || tm.displayName || "", abbr: tm.abbreviation || "",
        id: tm.id != null ? String(tm.id) : null,
        logo: (tm.logos && tm.logos[0] && tm.logos[0].href) || tm.logo || "",
        score: c.score != null ? String(c.score) : ""};
    };
    header = {state: t.state || "pre", detail: t.shortDetail || t.detail || "", home: side("home"), away: side("away")};
  }
  // team stat comparison
  const teams = bs.teams || [];
  const away = teams.find(t => t.homeAway === "away") || teams[0] || {};
  const home = teams.find(t => t.homeAway === "home") || teams[1] || {};
  const hstats = home.statistics || [];
  const teamStats = (away.statistics || []).map(s => {
    const h = hstats.find(x => x.name === s.name) || {};
    return {label: s.label || s.abbreviation || s.name || "", a: s.displayValue ?? "", h: h.displayValue ?? ""};
  }).filter(r => r.label);
  const abbrOf = t => (t.team && (t.team.abbreviation || t.team.shortDisplayName)) || "";
  // player box score groups
  const groups = [];
  for (const pt of (bs.players || [])) {
    const tm = pt.team || {};
    for (const g of (pt.statistics || [])) {
      const labels = g.labels || g.names || [];
      const rows = (g.athletes || []).filter(a => a.stats && a.stats.length).map(a => ({
        name: (a.athlete && (a.athlete.shortName || a.athlete.displayName)) || "",
        pos: (a.athlete && a.athlete.position && a.athlete.position.abbreviation) || "",
        aid: (a.athlete && a.athlete.id) || null,
        hs: (a.athlete && a.athlete.headshot && a.athlete.headshot.href) || "",
        stats: a.stats,
      }));
      if (rows.length) groups.push({
        team: tm.abbreviation || tm.name || "",
        title: g.text || (g.name ? g.name.charAt(0).toUpperCase() + g.name.slice(1) : "Stats"),
        labels, rows, totals: g.totals || [],
      });
    }
  }
  // leaders
  const leaders = (json.leaders || []).map(L => ({
    team: (L.team && (L.team.abbreviation || L.team.displayName)) || "",
    cats: (L.leaders || []).slice(0, 4).map(c => {
      const b = (c.leaders && c.leaders[0]) || {};
      return {cat: c.displayName || c.name || "", name: (b.athlete && (b.athlete.shortName || b.athlete.displayName)) || "",
        img: (b.athlete && b.athlete.headshot && b.athlete.headshot.href) || headshotUrl(key, b.athlete && b.athlete.id),
        val: b.displayValue || ""};
    }).filter(c => c.name),
  })).filter(L => L.cats.length);
  // plays & drives
  const plays = normPlays(json.plays);
  const drives = [];
  const dsrc = json.drives || {};
  const dl = [].concat(dsrc.current || [], (dsrc.previous || []).slice().reverse());
  for (const d of dl.slice(0, 14)) {
    drives.push({
      team: (d.team && (d.team.abbreviation || d.team.name)) || "",
      logo: (d.team && ((d.team.logos && d.team.logos[0] && d.team.logos[0].href) || d.team.logo)) || "",
      desc: d.description || "",
      result: d.displayResult || d.result || "",
      startYL: (d.start && d.start.yardLine) ?? null,
      plays: (d.plays || []).map(p => ({text: p.text || "", down: (p.start && p.start.downDistanceText) || "",
        clock: (p.clock && p.clock.displayValue) || "",
        startYL: (p.start && p.start.yardLine) ?? null, endYL: (p.end && p.end.yardLine) ?? null})),
    });
  }
  return {header, teamStats, groups, leaders, plays, drives, awayAbbr: abbrOf(away), homeAbbr: abbrOf(home),
    homeId: header && header.home.id, awayId: header && header.away.id};
}

function findCachedGame(key, eid){
  for (const [, v] of cache) {
    if (v.data) {
      const g = v.data.find(x => String(x.id) === String(eid));

async function refreshDetail(force){

  if (LEAGUES[panel.league].type === "tennis") {
    const m = findCachedGame(panel.league, panel.eid);
    if (!m || m.source !== "sofa") return; // ESPN fallback panel is static
    const entry = await fetchTennisDetail(panel.eid, force);
    if (!panel.open) return;
    panel.data = entry.data; panel.err = entry.err;
    renderTennisDetail();
    return;
  }

async function fetchTennisDetail(eid, force){
  const ck = `d|tennis|${eid}`;
  const hit = detailCache.get(ck);
  if (!force && hit && Date.now() - hit.t < CACHE_MS) return hit;
  const get = u => fetch(u, {cache: "no-store"}).then(r => r.ok ? r.json() : null).catch(() => null);
  const [ev, st, pbp] = await Promise.all([
    get(`${SOFA}/event/${eid}`),
    get(`${SOFA}/event/${eid}/statistics`),
    get(`${SOFA}/event/${eid}/point-by-point`),
  ]);
  let data = null, err = null;
  if (ev || st || pbp) {
    data = {
      match: (ev && ev.event) ? (parseSofaEvents([ev.event])[0] || null) : null,
      stats: parseSofaStats(st),
      pbp: parseSofaPbp(pbp),
    };
  } else err = "couldn't reach SofaScore";
  const entry = {t: Date.now(), data, err};
  detailCache.set(ck, entry);
  return entry;
}
function parseSofaStats(j){
  const list = (j && j.statistics) || [];
  const all = list.find(s => s.period === "ALL") || list[0];
  if (!all) return [];
  return (all.groups || []).map(g => ({
    group: g.groupName || "",
    items: (g.statisticsItems || []).map(i => ({name: i.name || "", home: i.home ?? "", away: i.away ?? ""})),
  })).filter(g => g.items.length);
}
function parseSofaPbp(j){
  const sets = ((j && j.pointByPoint) || []).slice().sort((a, b) => (b.set || 0) - (a.set || 0));
  return sets.map(s => ({
    set: s.set,
    games: (s.games || []).slice().sort((a, b) => (b.game || 0) - (a.game || 0)).map(g => ({
      game: g.game,
      serving: (g.score && g.score.serving) || 0,
      scoring: (g.score && g.score.scoring) || 0,
      hs: g.score ? g.score.homeScore : "", as: g.score ? g.score.awayScore : "",
      points: (g.points || []).map(p => ({h: p.homePoint ?? "", a: p.awayPoint ?? ""})),
    })),
  }));
}

      const srv = g.serving === 1 ? n1 : g.serving === 2 ? n2 : "";
      return `<div class="pbp-game">
        <div class="g-h"><b>Game ${esc(g.game)}</b>${srv ? `<span>serve: ${esc(srv)}</span>` : ""}${brk ? `<span class="brklab">BREAK</span>` : ""}<span style="margin-left:auto">${esc(g.hs)}–${esc(g.as)}</span></div>
        <div class="ptchips">${g.points.map(p => `<span class="ptchip">${esc(p.h)}–${esc(p.a)}</span>`).join("")}</div>
      </div>`;
    }).join("") + `</div>`).join("");
}
function renderTennisDetail(){
  const el = $("#panel");
  const cachedM = findCachedGame(panel.league, panel.eid);
  const m = (panel.data && panel.data.match) || cachedM;
  if (!m) {
    el.innerHTML = `<div class="p-head"><div class="p-score"><span class="p-team">Tennis</span></div><button class="close" id="pClose">✕</button></div>
      <div class="p-body"><div class="p-note">Match details unavailable.</div></div>`;
    el.querySelector("#pClose").onclick = closeDetail;
    return;
  }
  const head = `<div class="p-head"><div><div style="font-weight:700">${esc(m.tourney)}</div>
    <div class="meta">${esc([m.grouping, m.round, m.court].filter(Boolean).join(" · "))}
    ${m.state === "in" ? ` <span class="livebadge"><span class="pulse"></span>LIVE</span>` : ""} ${esc(m.detail || "")}</div></div>
    <button class="close" id="pClose">✕</button></div>`;
  if (m.source !== "sofa") {
    // ESPN fallback — no deep stats available
    el.innerHTML = head + `<div class="p-body">
      <div class="card match ${m.state === "in" ? "live" : ""}" style="cursor:default">${m.players.map(p => playerRow(p, m)).join("")}</div>
      <div class="p-note">Running on the ESPN fallback feed — serve stats and point-by-point aren't available right now.</div></div>`;
    el.querySelector("#pClose").onclick = closeDetail;
    return;
  }
  const prevBody = el.querySelector(".p-body");
  const st = prevBody ? prevBody.scrollTop : 0;
  const d = panel.data || {stats: [], pbp: []};
  const serving = (d.pbp[0] && d.pbp[0].games[0] && d.pbp[0].games[0].serving) || 0;
  let inner = head + tennisCourtSvg(m, serving);
  inner += `<div class="p-tabs">` + [["stats","Match Stats"],["points","Point by Point"]]
    .map(([id, l]) => `<button data-pt="${id}" class="${panel.tab === id ? "active" : ""}">${l}</button>`).join("") + `</div>`;
  let b;
  if (!panel.data && !panel.err) b = `<div class="loading"><span class="spinner"></span>Loading match details…</div>`;
  else if (panel.err && !panel.data) b = `<div class="errbox">Couldn't load match details (${esc(panel.err)}).</div>`;
  else b = panel.tab === "points" ? bodyTennisPoints(m, d.pbp) : bodyTennisStats(m, d.stats);
  inner += `<div class="p-body">${b}</div>`;
  el.innerHTML = inner;
  el.querySelector("#pClose").onclick = closeDetail;
  el.querySelectorAll("[data-pt]").forEach(bt => bt.onclick = () => { panel.tab = bt.dataset.pt; renderTennisDetail(); });
  const nb = el.querySelector(".p-body");
  if (nb) nb.scrollTop = st;
}

/* ============================== chrome ============================== */
function renderTabs(){
  $("#tabs").innerHTML = TABS.map(t =>
    `<button class="tab ${state.tab === t.id ? "active" : ""}" data-tab="${t.id}">${t.id === "live" ? '<span class="dot">●</span> ' : ""}${esc(t.label)}</button>`
  ).join("");
  $("#tabs").querySelectorAll(".tab").forEach(b => b.onclick = () => { state.tab = b.dataset.tab; renderTabs(); renderSubbar(); refresh(false); });
}
function seg(opts, cur, cb){
  const wrap = document.createElement("div");
  wrap.className = "seg";
  wrap.innerHTML = opts.map(o => `<button data-v="${o.v}" class="${o.v === cur ? "on" : ""}">${esc(o.l)}</button>`).join("");
  wrap.querySelectorAll("button").forEach(b => b.onclick = () => cb(b.dataset.v));
  return wrap;
}
function renderSubbar(){
  const bar = $("#subbar");
  bar.innerHTML = "";
  if (state.tab === "tennis") {
    bar.appendChild(seg([{v:"both",l:"ATP + WTA"},{v:"atp",l:"ATP"},{v:"wta",l:"WTA"}], state.tennisTour,
      v => { state.tennisTour = v; renderSubbar(); refresh(false); }));
  }
  if (state.tab === "cbb") {
    bar.appendChild(seg([{v:"mcb",l:"Men's"},{v:"wcb",l:"Women's"}], state.cbbGender,
      v => { state.cbbGender = v; renderSubbar(); refresh(false); }));
  }
  const collegeKey = state.tab === "cfb" ? "cfb" : (state.tab === "cbb" ? state.cbbGender : null);
  if (collegeKey) {
    const lg = LEAGUES[collegeKey];
    bar.appendChild(seg([{v:"top",l:"Top 25"},{v:"all",l:lg.college.allLabel}], state.scopeAll[collegeKey] ? "all" : "top",
      v => { state.scopeAll[collegeKey] = (v === "all"); renderSubbar(); refresh(false); }));
  }
}
function updateStamp(){
  if (!lastUpdated) return;
  const s = Math.max(0, Math.round((Date.now() - lastUpdated) / 1000));
  $("#updated").textContent = `updated ${s < 5 ? "just now" : s + "s ago"}${isToday() ? " · auto 30s" : ""}`;
}
function setDate(d){
  state.date = d;
  $("#datePick").value = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
  refresh(false);
}
function shiftDay(n){
  const d = new Date(state.date);
  d.setDate(d.getDate() + n);
  setDate(d);
}

/* ============================== boot ============================== */
function boot(){
  renderTabs();
  renderSubbar();
  $("#prevDay").onclick = () => shiftDay(-1);
  $("#nextDay").onclick = () => shiftDay(1);
  $("#todayBtn").onclick = () => setDate(new Date());
  $("#datePick").onchange = e => {
    const [y,m,dd] = e.target.value.split("-").map(Number);
    if (y) setDate(new Date(y, m-1, dd));
  };
  $("#refreshBtn").onclick = () => { refresh(true); refreshDetail(true); };
  $("#content").addEventListener("click", e => {
    const card = e.target.closest(".card[data-eid]");
    if (card) openDetail(card.dataset.league, card.dataset.eid);
  });
  $("#backdrop").onclick = closeDetail;
  document.addEventListener("keydown", e => { if (e.key === "Escape" && panel.open) closeDetail(); });
  setDate(new Date());
  setInterval(() => {
    updateStamp();
  }, 1000);
  setInterval(() => {
    if (document.hidden) return;
    if (isToday()) refresh(true);
    if (panel.open) {
      const ds = panel.data && (panel.data.header ? panel.data.header.state : (panel.data.match ? panel.data.match.state : null));
      if (ds !== "post") refreshDetail(true);
    }
  }, REFRESH_MS);
  document.addEventListener("visibilitychange", () => {
    if (!document.hidden && isToday()) refresh(true);
  });
}
boot();
</script>
</body>
</html>
